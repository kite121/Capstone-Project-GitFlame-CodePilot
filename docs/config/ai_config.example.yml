version: 1

repository:
  default_branch: main
  target_branch_prefix: ai/

analysis:
  enabled: true
  include:
    - src/**
    - internal/**
  exclude:
    - node_modules/**
    - dist/**
    - build/**
    - .git/**

code_generation:
  enabled: true
  require_user_approval: true
  reviewer_policy: issue_author
  allowed_actions:
    approve_command: "/approve"
    correct_command: "/correct"
    reject_command: "/reject"

recommendations:
  enabled: true
  # User-selected storage duration for recommendation reports, from 1 to 365 days.
  retention_days: 30
  severity_threshold: low
  categories:
    - code_duplication
    - security
    - maintainability
    - performance
    - architecture

rag:
  max_files: 20
  max_file_size_kb: 120
  context_strategy: issue_relevant_files
