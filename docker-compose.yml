services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      ML_SERVICE_URL: http://ml-service:8001
      DATABASE_URL: postgresql://gitflame:gitflame@database:5432/gitflame_codepilot
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - ml-service
      - database
      - redis

  ml-service:
    build:
      context: ./ml_service
    ports:
      - "${ML_SERVICE_PORT:-8001}:8001"

  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gitflame
      POSTGRES_PASSWORD: gitflame
      POSTGRES_DB: gitflame_codepilot
    ports:
      - "${DATABASE_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:

