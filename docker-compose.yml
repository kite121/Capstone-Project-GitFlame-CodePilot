services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      ML_SERVICE_URL: http://ml-service:8001
    depends_on:
      - ml-service
      - database

  ml-service:
    build:
      context: ./ml_service
    ports:
      - "8001:8001"

  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gitflame
      POSTGRES_PASSWORD: gitflame
      POSTGRES_DB: gitflame_codepilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

